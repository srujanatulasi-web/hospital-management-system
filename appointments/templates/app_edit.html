<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Appointment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 15px 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            color: white;
            font-size: 28px;
        }

        .back-btn {
            padding: 10px 25px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background-color: #5568d3;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #5568d3;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Update Appointment</h1>
        <a href="/dashboard/" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="container">
        <h2 class="form-title"> Edit Appointment</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="Enter doctor's full name" value="{{appointment.name}}" required>
            </div>
            <div class="form-group">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" name="date" class="form-input" value="{{ appointment.appointments_time|date:'Y-m-d' }}" required>
            </div>
            
            <div class="form-group">
                <label for="time" class="form-label">Time</label>
                <input type="time" id="time" name="time" class="form-input" value="{{ appointment.appointments_time|date:'H:i' }}" required>
            </div>

            <div class="form-group">
                <label for="specialization" class="form-label">Specialization</label>
                <input type="text" id="specialization" name="specialization" class="form-input" placeholder="Enter specialization" value="{{appointment.specialization}}" required>
            </div>
            <div class="form-group">
                 <label>Doctor</label>
            <select name="doctor">
            {% for doctor in doctors %}
            <option value="{{ doctor.id }}">
            {{ doctor }}
            </option>
            {% endfor %}
            </select>
            </div>

             <div class="form-group">
                  <label>Patient</label>
             <select name="patient">
             {% for patient in patients %}
             <option value="{{ patient.id }}">
            {{ patient }}
             </option>
              {% endfor %}
             </select>
             </div>

            <button type="submit" class="submit-btn">Update Appointment</button>
        </form>
    </div>
</body>
</html>
