<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }

        .box {
            width: 350px;
            margin: 80px auto;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
        }

        .header {
            background: #2b7bba;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
        }

        .body {
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2b7bba;
            color: white;
            border: none;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="header">
        <h1>Login</h1>
        <p>Login To Medha Hospital for quality health care services</p>
    </div>

    <div class="body">
        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">

            <button type="submit">login</button>
        </form>

        <div class="link">
            don't have an account? <a href="/signup">Login here</a>
        </div>
    </div>

</div>

</body>
</html>
