
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 15px 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .navbar h1 {
            color: white;
            font-size: 28px;
        }

        .logout-btn {
            padding: 8px 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .logout-btn:hover {
            background-color: #ff5252;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 14px;
            color: #666;
        }

        .card-patients {
            border-top: 4px solid #667eea;
        }

        .card-doctors {
            border-top: 4px solid #764ba2;
        }

        .card-appointments {
            border-top: 4px solid #f77f00;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Dashboard</h1>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="container">
        <div class="cards-grid">
            <a href="/patients" class="card card-patients">
                <div class="card-icon">👥</div>
                <div class="card-title">Patients</div>
                <div class="card-description">View and manage all patients</div>
            </a>

            <a href="/doctors" class="card card-doctors">
                <div class="card-icon">👨‍⚕️</div>
                <div class="card-title">Doctors</div>
                <div class="card-description">View and manage all doctors</div>
            </a>

            <a href="/appointments" class="card card-appointments">
                <div class="card-icon">📅</div>
                <div class="card-title">Appointments</div>
                <div class="card-description">View and manage appointments</div>
            </a>
        </div>
    </div>
</body>
</html>
